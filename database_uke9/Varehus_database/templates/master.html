<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>{% block title %}{% endblock %}</title>
        {{ bootstrap.load_css() }}
    </head>
    <body>
        <div class="container-fluid">
            <ul class="nav nav-tabs mb-3" id="dataTab" role="tablist">
                <li class="nav-item" role="presentation">
                    <a
                        class="nav-link {% if type != 'Items' %}active{% endif %}"
                        id="varehus-tab"
                        href="/varehus"
                        role="tab"
                    >
                        Varehus
                    </a>
                </li>
                <li class="nav-item" role="presentation">
                    <a
                        class="nav-link {% if type == 'Items' %}active{% endif %}"
                        id="varer-tab"
                        href="/varer"
                        role="tab"
                    >
                        Varer
                    </a>
                </li>
            </ul>

              <div>

                  {% block content %}{% endblock %}
              </div>

        </div>

        {{ bootstrap.load_js() }}
    </body>
</html>
